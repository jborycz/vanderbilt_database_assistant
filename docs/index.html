<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vanderbilt Database Assistant</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <style>
    :root {
      --gold: #CFAE70;
      --dark-gold: #7A6030;
      --black: #1B1B1B;
      --white: #FFFFFF;
      --bg: #F4F3EF;
      --border: #DDDBD4;
      --error-bg: #FEF2F2;
      --error-border: #FCA5A5;
      --error-text: #991B1B;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--black);
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--black);
      padding: 0.85rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.85rem;
      border-bottom: 3px solid var(--gold);
      flex-shrink: 0;
    }

    .logo {
      width: 38px;
      height: 38px;
      background: var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--black);
      flex-shrink: 0;
      user-select: none;
    }

    header h1 { font-size: 1rem; font-weight: 600; color: var(--gold); letter-spacing: 0.01em; }
    header p  { font-size: 0.75rem; color: #999; margin-top: 0.1rem; }

    /* ── Message list ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.875rem;
      scroll-behavior: smooth;
    }

    /* ── Welcome card ── */
    .welcome {
      background: var(--white);
      border: 1px solid var(--border);
      border-left: 4px solid var(--gold);
      border-radius: 10px;
      padding: 1.1rem 1.25rem 1rem;
      align-self: center;
      max-width: 560px;
      width: 100%;
      text-align: center;
    }

    .welcome h2 { font-size: 0.95rem; color: var(--dark-gold); margin-bottom: 0.4rem; }
    .welcome p  { font-size: 0.85rem; color: #555; line-height: 1.55; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      justify-content: center;
      margin-top: 0.8rem;
    }

    .chip {
      background: none;
      border: 1px solid var(--gold);
      color: var(--dark-gold);
      padding: 0.3rem 0.7rem;
      border-radius: 20px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .chip:hover { background: var(--gold); color: var(--black); }

    /* ── Bubbles ── */
    .bubble {
      max-width: 82%;
      padding: 0.65rem 0.9rem;
      border-radius: 14px;
      line-height: 1.55;
      font-size: 0.9rem;
      word-break: break-word;
    }

    .bubble.user {
      background: var(--black);
      color: var(--white);
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .bubble.assistant {
      background: var(--white);
      border: 1px solid var(--border);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      max-width: 92%;
    }

    /* markdown inside assistant bubble */
    .bubble.assistant p              { margin-bottom: 0.5em; }
    .bubble.assistant p:last-child   { margin-bottom: 0; }
    .bubble.assistant h1,
    .bubble.assistant h2,
    .bubble.assistant h3             { margin: 0.7em 0 0.2em; font-size: 0.95rem; }
    .bubble.assistant ul,
    .bubble.assistant ol             { margin: 0.3em 0 0.3em 1.3em; }
    .bubble.assistant li             { margin-bottom: 0.25em; }
    .bubble.assistant a              { color: var(--dark-gold); word-break: break-all; }
    .bubble.assistant strong         { font-weight: 600; }
    .bubble.assistant code           { font-size: 0.85em; background: #F0EDE6; padding: 0.1em 0.3em; border-radius: 3px; }

    /* ── Typing indicator ── */
    .typing {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 0.65rem 0.9rem;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 14px;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      width: fit-content;
    }

    .dot {
      width: 7px; height: 7px;
      background: var(--gold);
      border-radius: 50%;
      animation: bounce 1.1s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-7px); }
    }

    /* ── Error banner ── */
    .error-banner {
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      color: var(--error-text);
      padding: 0.65rem 0.9rem;
      border-radius: 10px;
      font-size: 0.85rem;
      align-self: stretch;
      line-height: 1.45;
    }

    /* ── Input area ── */
    #input-area {
      padding: 0.75rem 1rem;
      background: var(--white);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.6rem;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #user-input {
      flex: 1;
      padding: 0.55rem 0.8rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: inherit;
      resize: none;
      max-height: 140px;
      line-height: 1.45;
      outline: none;
      transition: border-color 0.15s;
      background: var(--bg);
    }
    #user-input:focus { border-color: var(--gold); background: var(--white); }

    #send-btn {
      background: var(--gold);
      color: var(--black);
      border: none;
      border-radius: 8px;
      padding: 0.55rem 1rem;
      font-weight: 600;
      font-size: 0.875rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    #send-btn:hover    { background: var(--dark-gold); color: var(--white); }
    #send-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    @media (max-width: 540px) {
      .bubble, .bubble.assistant { max-width: 96%; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">V</div>
  <div>
    <h1>Vanderbilt Database Assistant</h1>
    <p>AI-powered research database suggestions</p>
  </div>
</header>

<div id="messages">
  <div class="welcome" id="welcome-card">
    <h2>Find the right database for your research</h2>
    <p>Describe your research topic and I'll recommend the best Vanderbilt Libraries databases for you.</p>
    <div class="suggestions">
      <button class="chip" onclick="useSuggestion(this)">Mental health interventions</button>
      <button class="chip" onclick="useSuggestion(this)">Climate change policy</button>
      <button class="chip" onclick="useSuggestion(this)">Machine learning in medicine</button>
      <button class="chip" onclick="useSuggestion(this)">Civil War primary sources</button>
      <button class="chip" onclick="useSuggestion(this)">Economic inequality data</button>
    </div>
  </div>
</div>

<div id="input-area">
  <textarea id="user-input" placeholder="Describe your research topic…" rows="1"></textarea>
  <button id="send-btn" onclick="sendMessage()">Send</button>
</div>

<script>
  // ── CONFIG ──────────────────────────────────────────────────────────────────
  // After deploying to Render, replace the URL below with your actual backend URL.
  // Example: "https://vanderbilt-db-assistant.onrender.com"
  const BACKEND_URL = "https://vanderbilt-database-assistant.onrender.com";
  // ────────────────────────────────────────────────────────────────────────────

  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("user-input");
  const sendBtn    = document.getElementById("send-btn");
  const history    = [];

  // Auto-grow textarea
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
  });

  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function useSuggestion(btn) {
    inputEl.value = btn.textContent.trim();
    sendMessage();
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function appendBubble(role, html = "", raw = "") {
    const div = document.createElement("div");
    div.className = `bubble ${role}`;
    if (html) div.innerHTML = html;
    else      div.textContent = raw;
    messagesEl.appendChild(div);
    scrollBottom();
    return div;
  }

  function appendTyping() {
    const div = document.createElement("div");
    div.className = "typing";
    div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    messagesEl.appendChild(div);
    scrollBottom();
    return div;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;

    document.getElementById("welcome-card")?.remove();

    inputEl.value = "";
    inputEl.style.height = "auto";
    sendBtn.disabled = true;

    appendBubble("user", "", text);
    history.push({ role: "user", content: text });

    const typing = appendTyping();

    try {
      const res = await fetch(`${BACKEND_URL}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history }),
      });

      if (!res.ok) throw new Error(`Server returned ${res.status}`);

      typing.remove();
      const assistantBubble = appendBubble("assistant");

      let fullText = "";
      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buf += decoder.decode(value, { stream: true });
        const lines = buf.split("\n");
        buf = lines.pop(); // keep incomplete line

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const payload = line.slice(6).trim();
          if (payload === "[DONE]") break;

          let parsed;
          try { parsed = JSON.parse(payload); } catch { continue; }

          if (parsed.error) throw new Error(parsed.error);
          if (parsed.text) {
            fullText += parsed.text;
            assistantBubble.innerHTML = marked.parse(fullText);
            scrollBottom();
          }
        }
      }

      history.push({ role: "assistant", content: fullText });

    } catch (err) {
      typing.remove();
      const banner = document.createElement("div");
      banner.className = "error-banner";
      banner.textContent = `Something went wrong: ${err.message}. The server may be waking up from sleep — please wait a moment and try again.`;
      messagesEl.appendChild(banner);
      scrollBottom();
      history.pop(); // undo the user message since we got no response
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>

</body>
</html>
